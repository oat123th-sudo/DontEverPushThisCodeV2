on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: none
  issues: write
  pull-requests: write
  actions: read

jobs:
    secret-scanning:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                [cite_start]fetch-depth: 0 # ดึงประวัติทั้งหมดเพื่อให้ตรวจสอบความลับที่เคย Commit ในอดีตได้ 

            - name: Run TruffleHog
              uses: trufflesecurity/trufflehog@main
              continue-on-error: true
              with:
                path: ./
                base: ${{ github.event.repository.default_branch }}
                head: HEAD
                [cite_start]extra_args: --only-verified # รายงานเฉพาะความลับที่ตรวจสอบแล้วว่าเป็นของจริง [cite: 62]

            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2
              continue-on-error: true
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
                GITLEAKS_ENABLE_SUMMARY: true

    sast-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }} 
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: SonarQube Scan
              uses: SonarSource/sonarqube-scan-action@v4.1.0
              continue-on-error: true
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    codeql-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }} 
        strategy:
            matrix:
                [cite_start]language: [ 'javascript-typescript' ] # โปรเจกต์ Next.js ใช้ภาษานี้ [cite: 18]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                languages: ${{ matrix.language }}
                [cite_start]queries: security-extended,security-and-quality # ใช้ทั้งสองชุดเพื่อตรวจทั้งความปลอดภัยและคุณภาพ 

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3
              with:
                category: "/language:${{ matrix.language }}"

    dependency-scanning:
        runs-on: ubuntu-latest
        needs: [sast-scan, secret-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: 20

            - name: Install dependencies
              run: npm install

            - name: Depcheck
              uses: dependency-check/Dependency-Check_Action@main
              continue-on-error: true
              id: Depcheck
              with:
                project: 'DontEverPushThisCodeV2'
                path: '.'
                [cite_start]format: 'SARIF' # ฟอร์แมตที่ใช้ร่วมกับ GitHub Security tab ได้ 
                out: 'reports'
                args: >
                    --failOnCVSS 7
                    --enableRetired

            - name: Upload Depcheck SARIF to Security tab
              if: always() 
              uses: github/codeql-action/upload-sarif@v3
              continue-on-error: true
              with:
                  sarif_file: reports/dependency-check-report.sarif
                  category: dependency-check

            - name: Upload Depcheck HTML report as artifact
              if: always() 
              uses: actions/upload-artifact@v4
              with:
                name: depcheck-report
                path: reports/

    image-scanning:
        runs-on: ubuntu-latest
        needs: [dependency-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build Docker image
              run: docker build -t my-app:latest .

            - name: Trivy Scan
              uses: aquasecurity/trivy-action@master
              continue-on-error: true
              with:
                image-ref: 'my-app:latest'
                format: 'sarif'
                output: 'trivy-results.sarif'
                severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
                ignore-unfixed: true

            - name: Upload Trivy SARIF to Security tab
              uses: github/codeql-action/upload-sarif@v3
              with:
                sarif_file: 'trivy-results.sarif'
                category: trivy

            - name: Upload trivy-results.sarif as workflow artifact
              uses: actions/upload-artifact@v4
              with:
                name: trivy-report
                path: trivy-results.sarif
